<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Manager - Alta Jugador</title>
    <link rel="stylesheet" href="Css/Css.css">
</head>
<body>

    <header>
        <a href="index.html" class="logo">
            <span>Football Manager</span>
        </a>
        <nav>
            <a href="index.html">Inici</a>
            <a href="equipos.html">Equips</a>
            <a href="partidos.html">Resultats</a>
            <a href="clasificacion.html">Classificació</a>
            <a href="formulario.html" class="actiu">Alta Jugador</a>
        </nav>
    </header>

    <div class="titol-pagina">Alta de Jugador / Entrenador</div>

    <main>
        <div class="formulari-contenidor">

            <div class="avis">
                ⚠️ Només s'ha de realitzar el disseny del formulari. NO enviarem cap informació a la base de dades! ⚠️
            </div>

            <form>

                <div class="grup">
                    <label for="nom">Nom *</label>
                    <input type="text" id="nom" name="nom" required>
                </div>

                <div class="grup">
                    <label for="alcada">Alçada (cm) *</label>
                    <input type="number" id="alcada" name="alcada" min="140" max="220" required>
                </div>

                <div class="grup">
                    <label for="pes">Pes (kg) *</label>
                    <input type="number" id="pes" name="pes" min="40" max="150" required>
                </div>

                <div class="grup">
                    <label for="data-naix">Data de naixement *</label>
                    <input type="date" id="data-naix" name="data-naix" required>
                </div>

                <div class="grup">
                    <label for="foto">Fotografia</label>
                    <input type="file" id="foto" name="foto" accept="image/*">
                </div>

                <div class="grup">
                    <label>Tipus *</label>
                    <div class="opcions-tipus">
                        <label>
                            <input type="radio" name="tipus" value="jugador" checked onchange="canviarTipus()">
                            Jugador/a
                        </label>
                        <label>
                            <input type="radio" name="tipus" value="entrenador" onchange="canviarTipus()">
                            Entrenador/a
                        </label>
                    </div>
                </div>

                <div id="seccio-posicions" class="grup">
                    <label>Posicions *</label>
                    <div class="posicions-grid">
                        <label>
                            <input type="checkbox" name="posicio" value="Porter">
                            Porter
                        </label>
                        <label>
                            <input type="checkbox" name="posicio" value="Defensa">
                            Defensa
                        </label>
                        <label>
                            <input type="checkbox" name="posicio" value="Migcampista">
                            Migcampista
                        </label>
                        <label>
                            <input type="checkbox" name="posicio" value="Davanter">
                            Davanter
                        </label>
                    </div>
                </div>

                <div class="grup">
                    <label for="equip">Equip *</label>
                    <select id="equip" name="equip" required>
                        <option value="">Selecciona un equip...</option>
                    </select>
                </div>

                <button type="submit" class="boto-enviar">Donar d'alta</button>

            </form>
        </div>
    </main>

    <footer>
        <p>Football Manager 2025 | Tots els drets reservats</p>
    </footer>

    <script src="Js/formulario.js"></script>

</body>
</html>
